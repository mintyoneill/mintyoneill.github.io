<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mint O'Neill - Graphic Design Portfolio</title>
  <link rel="stylesheet" href="css/style-p2.css">
  <link rel="stylesheet" href="https://use.typekit.net/ryv1fsj.css">
</head>

<body>
  <a class="nav-icon-home">
    <img src="images/mo-nogram-mint.svg">
  </a>
  <header class="hero">
    <div class="hero-lockup">
      <div class="hero-lockup-bg"></div>
      <div class="hero-lockup-text">
        <h1>Hi, I'm <span>Mint O'Neill</span>.</h1>
        <h3>I'm a freelance graphic designer from the Seattle area focused on making your print and digital projects pop.</h3>
      </div>
    </div>
    <div class="hero-pattern"></div>
    <div id="hero-gradient"></div>
  </header>
  <div class="specialties">
    <div class="wayfinding">wayfinding</div>
    <div class="web">stuff</div>
    <div class="motion">motion</div>
  </div>

  <main class="portfolio" id="portfolio">
    <nav class="left">
      <ul>
        <li><a href="#portfolio" id="featured">FEATURED</a></li>
        <li><a href="#portfolio" id="wayfinding">WAYFINDING</a></li>
        <li><a href="#portfolio" id="print">PRINT</a></li>
        <li><a href="#portfolio" id="web">WEB/UI</a></li>
        <li><a href="#portfolio" id="motion">MOTION</a></li>
        <li><a class="button" href="#portfolio">MORE FILTERS</a></li>
      </ul>
    </nav>
    <section class="right">
      <article class="portfolio-grid">
        <div class="card web">
          <div class="card-hover-text">
            <h3>Sample Project Name Here</h3>
          </div>
          <img src="https://picsum.photos/seed/picsum/200/300">
        </div>
        <div class="card print">
          <img src="https://picsum.photos/seed/picsum1/200/300">Text here</img>
        </div>
        <div class="card wayfinding">
          <img src="https://picsum.photos/seed/picsum2/200/300">
        </div>
        <div class="card print">
          <img src="https://picsum.photos/seed/picsum3/200/300">
        </div>
        <div class="card wayfinding">
          <img src="https://picsum.photos/seed/picsum4/200/300">
        </div>
        <div class="card motion">
          <img src="https://picsum.photos/seed/picsum5/200/300">
        </div>
        <div class="card web">
          <img src="https://picsum.photos/seed/picsum6/200/300">
        </div>
        <div class="card web motion">
          <img src="https://picsum.photos/seed/picsum7/200/300">
        </div>
        <div class="card motion">
          <img src="https://picsum.photos/seed/picsum8/200/300">
        </div>
        <div class="card print wayfinding">
          <img src="https://picsum.photos/seed/picsum9/200/300">
        </div>
        <div class="card print">
          <img src="https://picsum.photos/seed/picsum0/200/300">
        </div>
      </article>


    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.utils.toArray('hero').forEach((panel,i) => {
      ScrollTrigger.create({
        trigger: panel,
        start: 'top top',
        pin: true,
        pinSpacing: false // this makes sure that if the panels are different heights, there's no gap
      });
    });
     
    </script>
  <script src="https://code.jquery.com/jquery-4.0.0.slim.js" integrity="sha256-M+GjhMBfXikM1izMplICCTscIj5hzPCp6uDzaypxtgg="crossorigin="anonymous"></script>

  <script>
     $("#wayfinding").click(function () {
      $(".card").hide();
      $(".wayfinding").show();
    });
    $("#print").click(function () {
      $(".card").hide();
      $(".print").show();
    });
    $("#web").click(function () {
      $(".card").hide();
      $(".web").show();
    });
    $("#motion").click(function () {
      $(".card").hide();
      $(".motion").show();
    });
    $("#featured").click(function () {
      $(".card").show();
    });
  </script>
  <script src="js/script.js"></script>
</body>

</html>
